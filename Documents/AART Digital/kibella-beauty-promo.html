<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>Kibella Beauty - Divulgação</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root {
      --rose-gold: #C4A484;
      --rose-dark: #8B6F5C;
      --cream: #FAF7F2;
      --pearl: #FDFBF9;
      --berry: #6B4E5A;
      --champagne: #F0E6D8;
      --gold: #B8956E;
      --dark: #2D2420;
      --blush: #E8D5D0;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Outfit', sans-serif;
      background: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    
    .canvas-container {
      position: relative;
      width: 1080px;
      height: 1080px;
      background: linear-gradient(145deg, var(--cream) 0%, var(--blush) 40%, var(--champagne) 100%);
      overflow: hidden;
    }
    
    .bg-elements {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    
    .circle {
      position: absolute;
      border-radius: 50%;
      border: 1px solid var(--rose-gold);
    }
    
    .c1 { width: 500px; height: 500px; top: -150px; right: -150px; opacity: 0.2; }
    .c2 { width: 350px; height: 350px; bottom: -100px; left: -100px; opacity: 0.15; }
    .c3 { width: 180px; height: 180px; top: 35%; left: 5%; background: var(--rose-gold); opacity: 0.08; }
    .c4 { width: 100px; height: 100px; bottom: 20%; right: 10%; background: var(--gold); opacity: 0.1; }
    
    .line {
      position: absolute;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--rose-gold), transparent);
      opacity: 0.25;
    }
    
    .l1 { width: 250px; top: 18%; left: 8%; transform: rotate(-15deg); }
    .l2 { width: 180px; bottom: 25%; right: 8%; transform: rotate(10deg); }
    
    .frame {
      position: absolute;
      border: 1px solid var(--rose-gold);
      opacity: 0.2;
    }
    
    .f1 { width: 120px; height: 120px; top: 60%; left: 12%; transform: rotate(25deg); }
    .f2 { width: 80px; height: 80px; bottom: 15%; right: 20%; transform: rotate(-20deg); }
    
    .content {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px;
    }
    
    .logo-section {
      position: absolute;
      top: 50px;
      left: 60px;
      display: flex;
      align-items: center;
      gap: 18px;
    }
    
    .logo-mark {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, var(--rose-dark), var(--berry));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .logo-mark svg {
      width: 38px;
      height: 38px;
      fill: white;
    }
    
    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 600;
      color: var(--dark);
      letter-spacing: 2px;
    }
    
    .tagline {
      position: absolute;
      top: 55px;
      right: 60px;
      font-size: 13px;
      color: var(--berry);
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 400;
    }
    
    .main-text {
      text-align: center;
      max-width: 750px;
    }
    
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 96px;
      font-weight: 600;
      color: var(--dark);
      line-height: 1.05;
      margin-bottom: 28px;
    }
    
    h1 span {
      color: var(--rose-dark);
      font-style: italic;
    }
    
    .subtitle {
      font-size: 24px;
      color: var(--berry);
      font-weight: 300;
      margin-bottom: 45px;
      letter-spacing: 0.5px;
    }
    
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-bottom: 55px;
    }
    
    .tag {
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(8px);
      padding: 14px 28px;
      border-radius: 40px;
      font-size: 13px;
      color: var(--dark);
      font-weight: 400;
      letter-spacing: 0.8px;
      border: 1px solid rgba(196, 164, 132, 0.3);
    }
    
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      background: linear-gradient(135deg, var(--rose-dark), var(--berry));
      color: white;
      padding: 22px 52px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 2px;
      text-decoration: none;
      box-shadow: 0 12px 45px rgba(107, 78, 90, 0.35);
    }
    
    .cta svg {
      width: 18px;
      height: 18px;
      fill: white;
    }
    
    .url {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      color: var(--rose-gold);
      font-weight: 400;
      letter-spacing: 3px;
    }
    
    .corner-decor {
      position: absolute;
      width: 60px;
      height: 60px;
      border: 1px solid var(--rose-gold);
      opacity: 0.3;
    }
    
    .cd1 { top: 40px; left: 40px; border-right: none; border-bottom: none; }
    .cd2 { top: 40px; right: 40px; border-left: none; border-bottom: none; }
    .cd3 { bottom: 40px; left: 40px; border-right: none; border-top: none; }
    .cd4 { bottom: 40px; right: 40px; border-left: none; border-top: none; }
    
    .download-btn {
      margin-top: 30px;
      padding: 16px 40px;
      font-size: 16px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
    }
    
    .download-btn:hover {
      background: #45a049;
    }
  </style>
</head>
<body>
  <div class="canvas-container" id="canvas">
    <div class="bg-elements">
      <div class="circle c1"></div>
      <div class="circle c2"></div>
      <div class="circle c3"></div>
      <div class="circle c4"></div>
      <div class="line l1"></div>
      <div class="line l2"></div>
      <div class="frame f1"></div>
      <div class="frame f2"></div>
    </div>
    
    <div class="corner-decor cd1"></div>
    <div class="corner-decor cd2"></div>
    <div class="corner-decor cd3"></div>
    <div class="corner-decor cd4"></div>
    
    <div class="content">
      <div class="logo-section">
        <div class="logo-mark">
          <svg viewBox="0 0 24 24"><path d="M12 2L9.19 8.63L2 9.24L7.46 13.97L5.82 21L12 17.27L18.18 21L16.54 13.97L22 9.24L14.81 8.63L12 2Z"/></svg>
        </div>
        <span class="brand-name">Kibella Beauty</span>
      </div>
      
      <span class="tagline">Sua empresa além dos atendimentos</span>
      
      <div class="main-text">
        <h1>Aprendizado que <span>Transforma</span></h1>
        <p class="subtitle">Apostilas editáveis para profissionais da beleza expandirem seus negócios</p>
        
        <div class="tags">
          <span class="tag">Extensão de Cílios</span>
          <span class="tag">Design de Sobrancelhas</span>
          <span class="tag">Micropigmentação</span>
          <span class="tag">Manicure & Pedicure</span>
        </div>
        
        <a href="https://loja.kibellabeauty.com.br/" class="cta">
          <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
          VISITAR LOJA
        </a>
      </div>
      
      <span class="url">loja.kibellabeauty.com.br</span>
    </div>
  </div>
  
  <button class="download-btn" onclick="downloadPNG()">Baixar PNG</button>
  
  <script>
    function downloadPNG() {
      const canvas = document.getElementById('canvas');
      html2canvas(canvas, { scale: 1, useCORS: true }).then(canvas => {
        const link = document.createElement('a');
        link.download = 'kibella-beauty-divulgacao.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    }
  </script>
</body>
</html>
